<h2>{t_live_score_title}</h2>
<p class="subtitle">{t_live_score_subtitle}</p>

<div class="ad-slot">
    </div>

<div class="pitch-container" style="margin: 20px 0;">
    <div class="pitch" style="position: relative; width: 100%; height: 380px; background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%); border: 3px solid #fff; border-radius: 8px; overflow: hidden;">
        <div class="pitch-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-bottom: 2px solid rgba(255,255,255,0.5);"></div>
        <div class="center-circle" style="position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%);"></div>
        
        <div id="players-layout-target">
            <div style="color: rgba(255,255,255,0.7); text-align: center; padding-top: 170px; font-size: 0.95rem;">
                {t_live_waiting_message}
            </div>
        </div>
    </div>
</div>

<div class="ad-slot">
    </div>

<div style="text-align: center; margin-top: 25px;">
    <a href="#" class="btn-cta" style="display: inline-block; background-color: #ff0000; color: #fff; padding: 14px 30px; font-weight: bold; text-decoration: none; border-radius: 8px; box-shadow: 0 4px 15px rgba(255,0,0,0.3);">
        {t_btn_watch_live}
    </a>
</div>
